<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>なるたつのいつもおつかれーいミニゲーム</title>
        <meta name="description" content="メインページ">
        <meta name="viewport" content="width=device-width">
        <script src="js/minigame.js"></script>
        <link href="css/minigame.css" rel="stylesheet">
    </head>
    <body>
        <main class="main">
            <div class="first-view">
                <div class="first-view-text">
                    <h1>頭の体操になるミニゲーム</h1>
                    <p>与えられた数字と四則演算を用いて10を作ろう</p>
                </div>
            </div>
            <div class="minigame">
                <button class="prob" onclick="makeProblem()">問題生成</button>

                <p class="numbers" id="numbers"></p>
                <p class="answer" id="answer"></p>
                <p class="result" id="result"></p>
                
                <button class="num" onclick="makeAnswer(nums[0],this,0)">数字1</button>
                <button class="num" onclick="makeAnswer(nums[1],this,0)">数字2</button>
                <button class="num" onclick="makeAnswer(nums[2],this,0)">数字3</button>
                <button class="num" onclick="makeAnswer(nums[3],this,0)">数字4</button><br>

                <button class="ope" onclick="makeAnswer('+',this,1)">+</button>
                <button class="ope" onclick="makeAnswer('-',this,1)">-</button>
                <button class="ope" onclick="makeAnswer('*',this,1)">*</button>
                <button class="ope" onclick="makeAnswer('/',this,1)">/</button>
                <button class="calc" onclick="calclate()">=</button><br>

                <button class="clear" onclick="clearAnswer()">クリア</button>
                <button class="judge" onclick="judgeAnswer()">判定</button>
            </div>
            <p class="notice">※ 数字は左から1,2と番号付けられています．<br>※ *は×，/は÷に当たります</p>

            <h2 class="rule">~遊び方~</h2>
            <ol>
                <li>問題生成をクリック</li>
                <li>試行錯誤して数字をそれぞれ一回のみ使用して10を作ろう</li>
                <li>できたら判定をクリックして確かめよう</li>
            </ol>
            <h3 class="hint" >ヒント</h3>
            <p>時々"="ボタンをクリックして現在の値を見てみよう</p>
            <p>数字を順番に使う必要はないよ</p>
        </main>
    </body>

</html>
