<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本日の運勢おみくじ</title>
    <link rel="stylesheet" href="css/omikuji.css">
</head>
<body>
    <div class="container">
        <h1>本日の運勢おみくじ</h1>
        <p class="description">
            ボタンを押して、今日の運命を決定しよう！！
        </p>

        <div id="countdown" class="countdown">3</div>

        <button id="omikujiButton" class="omikuji-button">
            おみくじを引く
        </button>

        <div id="result" class="result hidden">
            <h2 id="fortune"></h2>
            <p id="comment"></p>
        </div>
    </div>

    <script src="js/omikuji.js"></script>
</body>
</html>
